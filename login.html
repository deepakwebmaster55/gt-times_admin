<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Glamtreasure Admin Login</title>
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body>
  <header class="admin-header">
    <div class="container">
      <div class="brand">
        <span>Glamtreasure Admin</span>
      </div>
    </div>
  </header>

  <main class="container" style="padding:2rem 0;">
    <div class="card" style="max-width:480px; margin:0 auto;">
      <h2>Admin Sign In</h2>
      <p class="small">Use the admin email and password created in Supabase Auth.</p>
      <form class="form-grid" id="login-form">
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" required />
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" id="password" required />
        </div>
        <button class="btn" type="submit">Sign In</button>
        <p class="small" id="login-status"></p>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script>
    const loginForm = document.getElementById("login-form");
    const statusEl = document.getElementById("login-status");

    if (loginForm) {
      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        if (!window.gtSupabase1) {
          statusEl.textContent = "Supabase keys missing in admin/js/config.js";
          return;
        }
        const { error } = await window.gtSupabase1.auth.signInWithPassword({ email, password });
        if (error) {
          statusEl.textContent = error.message;
          return;
        }
        window.location.href = "index.html";
      });
    }
  </script>
</body>
</html>
