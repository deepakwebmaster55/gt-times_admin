<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bookings | Glamtreasure Admin</title>
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body data-admin-guard>
  <header class="admin-header">
    <div class="container">
      <div class="brand">
        <span>Glamtreasure Admin</span>
      </div>
      <div class="actions-row">
        <a class="btn secondary" href="index.html">Dashboard</a>
        <button class="btn secondary" data-admin-logout>Logout</button>
      </div>
    </div>
  </header>

  <main class="container" style="padding:2rem 0;">
    <div class="card" style="margin-bottom:1.2rem;">
      <h2>Bookings & COD Orders <span class="badge" data-orders-badge>0</span></h2>
      <p class="small">Shows customer info, address, and items once a booking is created.</p>
      <p class="small" data-orders-status></p>
    </div>

    <div class="card">
      <div style="overflow:auto;">
        <table class="table">
          <thead>
            <tr>
              <th>Order</th>
              <th>Date</th>
              <th>Customer</th>
              <th>Contact</th>
              <th>Address</th>
              <th>Items</th>
              <th>Total</th>
              <th>Status</th>
              <th>Payment</th>
            </tr>
          </thead>
          <tbody data-orders-body></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/orders.js"></script>
</body>
</html>
