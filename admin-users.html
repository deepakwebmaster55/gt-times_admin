<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Access | Glamtreasure</title>
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body data-admin-guard>
  <header class="admin-header">
    <div class="container">
      <div class="brand">
        <span>Glamtreasure Admin</span>
      </div>
      <div class="actions-row">
        <a class="btn secondary" href="index.html">Dashboard</a>
        <button class="btn secondary" data-admin-logout>Logout</button>
      </div>
    </div>
  </header>

  <main class="container" style="padding:2rem 0;">
    <div class="card" style="margin-bottom:1.2rem;">
      <h2>Create Admin Access (Supabase 3)</h2>
      <p class="small">This creates the same admin user in Supabase 3 and marks them as admin.</p>
      <p class="small" data-admin-access-status></p>
    </div>

    <div class="card" style="max-width:520px;">
      <form class="form-grid" data-admin-create-form>
        <div>
          <label for="admin-name">Full Name</label>
          <input id="admin-name" name="full_name" type="text" placeholder="Admin name" required />
        </div>
        <div>
          <label for="admin-email">Email</label>
          <input id="admin-email" name="email" type="email" placeholder="admin@email.com" required />
        </div>
        <div>
          <label for="admin-phone">Phone</label>
          <input id="admin-phone" name="phone" type="tel" placeholder="Phone (optional)" />
        </div>
        <div>
          <label for="admin-password">Password</label>
          <input id="admin-password" name="password" type="password" placeholder="Set password" required />
        </div>
        <button class="btn" type="submit">Create Admin Access</button>
      </form>
    </div>

    <div class="card" style="margin-top:1.2rem;">
      <h3>What this does</h3>
      <ul class="small">
        <li>Creates the user in Supabase 3 Auth</li>
        <li>Creates/updates the profile in Supabase 3</li>
        <li>Marks <code>is_admin = true</code></li>
      </ul>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/admin-users.js"></script>
</body>
</html>
