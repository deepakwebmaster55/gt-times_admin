<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Reviews | Glamtreasure</title>
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body data-admin-guard>
  <header class="admin-header">
    <div class="container">
      <div class="brand"><span>Glamtreasure Admin</span></div>
      <div class="actions-row">
        <a class="btn secondary" href="../index.html" target="_blank" rel="noopener">Preview Site</a>
<a class="btn secondary" href="index.html">Dashboard</a>
        <button class="btn secondary" data-admin-logout>Logout</button>
      </div>
    </div>
  </header>

  <main class="container" style="padding:2rem 0;">
    <div class="card" style="margin-bottom:1.2rem;">
      <h2>Reviews</h2>
      <p class="small">Add or remove reviews. Customers cannot add reviews directly.</p>
    </div>

    <div class="admin-grid" style="grid-template-columns: 1.1fr 1fr;">
      <div class="card">
        <h3>Review Form</h3>
        <form class="form-grid" id="review-form">
          <input type="hidden" id="review-id" />
          <div>
            <label for="review-name">Name</label>
            <input type="text" id="review-name" required />
          </div>
          <div>
            <label for="review-email">Email</label>
            <input type="email" id="review-email" />
          </div>
          <div>
            <label for="review-rating">Rating</label>
            <input type="number" step="0.1" id="review-rating" />
          </div>
          <div>
            <label for="review-feedback">Feedback</label>
            <textarea id="review-feedback"></textarea>
          </div>
          <div>
            <label>
              <input type="checkbox" id="review-active" checked /> Active
            </label>
          </div>
          <div class="actions-row">
        <a class="btn secondary" href="../index.html" target="_blank" rel="noopener">Preview Site</a>
<button class="btn" type="submit">Save Review</button>
            <button class="btn secondary" type="button" id="review-reset">Clear</button>
          </div>
          <p class="small" id="review-status"></p>
        </form>
      </div>

      <div class="card">
        <h3>Existing Reviews</h3>
        <div style="overflow:auto;">
          <table class="table" id="review-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Rating</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

    <script defer src="https://pushrelay.com/pixel/PCV4Lj58BPsG6VDC"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>  <script src="js/reviews.js"></script>
</body>
</html>
